<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a84ff"/>
      <stop offset="100%" style="stop-color:#5E5CE6"/>
    </linearGradient>
    <linearGradient id="light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e8e8ff;stop-opacity:0.95"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Pie chart shape -->
  <!-- Outer circle -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="url(#light)" stroke-width="28" opacity="0.3"/>
  <!-- Pie slice 1 (larger) -->
  <path d="M256 240 L256 100 A140 140 0 0 1 380 320 Z" fill="url(#light)" opacity="0.9"/>
  <!-- Pie slice 2 (smaller) -->
  <path d="M256 240 L380 320 A140 140 0 0 1 200 370 Z" fill="url(#light)" opacity="0.6"/>
  <!-- Pie slice 3 -->
  <path d="M256 240 L200 370 A140 140 0 0 1 256 100 Z" fill="url(#light)" opacity="0.4"/>

  <!-- Rising arrow (growth indicator) -->
  <path d="M290 310 L290 200 L350 200 L270 120 L190 200 L250 200 L250 310 Z" fill="#0a84ff" opacity="0.9"/>

  <!-- "HF" text below -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="72" fill="#ffffff" letter-spacing="4">HF</text>
</svg>
